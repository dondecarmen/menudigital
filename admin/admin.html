<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Donde Carmen</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: #f1f5f9; color: #1e293b; padding: 20px; }
        header { max-width: 1000px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 166px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h1 { color: #ff4757; font-weight: 800; font-size: 1.8rem; }
        
        /* Dashboard Stats */
        .dashboard { max-width: 1000px; margin: 0 auto 20px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 5px solid #ff4757; }
        .card.ventas { border-left-color: #25d366; }
        .card.promedio { border-left-color: #ffc107; }
        .card p { font-size: 0.85rem; color: #64748b; text-transform: uppercase; font-weight: 600; }
        .card h2 { font-size: 1.8rem; font-weight: 800; margin-top: 5px; }

        /* Contenedor Principal */
        main { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .seccion-acciones { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f1f5f9; gap: 10px; flex-wrap: wrap; }
        
        /* Botones */
        button { padding: 10px 18px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; transition: all 0.2s; }
        .btn-limpiar { background: #ffe0e2; color: #ff4757; }
        .btn-limpiar:hover { background: #ff4757; color: white; }
        .btn-exportar { background: #e0f2fe; color: #0369a1; }
        .btn-exportar:hover { background: #0369a1; color: white; }
        .btn-imprimir { background: #cbd5e1; color: #1e293b; margin-top: 10px; }
        .btn-imprimir:hover { background: #94a3b8; }
        
        /* Botones de Ajustes en Comanda */
        .btn-cancelar-pedido { background: #fee2e2; color: #ef4444; padding: 6px 12px; font-size: 0.75rem; }
        .btn-cancelar-pedido:hover { background: #ef4444; color: white; }
        .btn-accion-item { background: none; color: #64748b; padding: 2px 6px; font-size: 0.85rem; border-radius: 4px; }
        .btn-accion-item:hover { background: #f1f5f9; color: #1e293b; }

        /* Alerta Activar Sonido */
        .btn-alerta-audio { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; margin-right: 10px; animation: parpadeoLuz 2s infinite; }
        .btn-alerta-audio.activo { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; animation: none; }

        /* Lista de pedidos */
        .pedido-bloque { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .pedido-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; border-bottom: 1px dashed #cbd5e1; padding-bottom: 8px; margin-bottom: 10px; font-size: 0.95rem; }
        .pedido-fecha { color: #64748b; font-size: 0.85rem; }
        .pedido-total { color: #25d366; font-size: 1.1rem; font-weight: 800; }
        .pedido-items ul { list-style: none; padding-left: 5px; }
        .pedido-items li { font-size: 0.9rem; margin-bottom: 10px; color: #334155; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .detalles-item { font-size: 0.8rem; color: #64748b; font-style: italic; padding-left: 0px; margin-top: 2px; cursor: pointer; transition: color 0.2s; }
        .detalles-item:hover { color: #ff4757; text-decoration: underline; }

        .sin-pedidos { text-align: center; color: #94a3b8; padding: 40px 0; font-weight: 600; }

        @keyframes parpadeoLuz {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* ==========================================================================
           🖨️ CONFIGURACIÓN DE IMPRESIÓN (ESTILO TICKETERA)
           ========================================================================== */
        @media print {
            body * { visibility: hidden; background: transparent; }
            #ticket-impresion, #ticket-impresion * { visibility: visible; }
            #ticket-impresion { position: absolute; left: 0; top: 0; width: 100%; max-width: 80mm; padding: 0; margin: 0; color: #000000; font-family: 'Courier New', Courier, monospace; }
            .pedido-header { font-size: 1.1rem; border-bottom: 2px dashed #000; padding-bottom: 5px; }
            .pedido-items li { font-size: 1rem; margin-bottom: 8px; line-height: 1.2; display: block; }
            .detalles-item { font-size: 0.85rem; color: #000; font-weight: bold; }
            .pedido-total { font-size: 1.2rem; border-top: 2px dashed #000; padding-top: 5px; display: block; }
            #ticket-impresion button, #ticket-impresion a, #ticket-impresion .controles-item-derecha { display: none !important; }
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Donde Carmen</h1>
            <p style="color: #64748b; font-size: 0.9rem;">Panel de Control de Ventas</p>
        </div>
        <div style="display: flex; align-items: center;">
            <button id="btn-audio" class="btn-alerta-audio" onclick="desbloquearAudio()">🔊 Activar Sistema</button>
            <a href="index.html" style="text-decoration: none;"><button class="btn-exportar">🛒 Ver Menú</button></a>
        </div>
    </header>

    <div class="dashboard">
        <div class="card">
            <p>Pedidos Hoy</p>
            <h2 id="total-pedidos">0</h2>
        </div>
        <div class="card ventas">
            <p>Ventas Totales</p>
            <h2 id="total-ventas">$0</h2>
        </div>
        <div class="card promedio">
            <p>Ticket Promedio</p>
            <h2 id="ticket-promedio">$0</h2>
        </div>
    </div>

    <main>
        <div class="seccion-acciones">
            <h3 style="font-weight: 700; font-size: 1.2rem;">Historial de Ventas</h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn-exportar" onclick="exportarReporte()">CSV / Excel 📥</button>
                <button class="btn-limpiar" onclick="limpiarBaseDatos()">Cerrar Caja 🔐</button>
            </div>
        </div>

        <div id="contenedor-historial"></div>
    </main>
<!-- Cargar Firebase desde la nube (SDK oficial de Google) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
   <script>
        // =========================================================================
        // 🔥 CONEXIÓN OFICIAL CON FIREBASE (PANEL ADMIN)
        // =========================================================================
        const firebaseConfig = {
          apiKey: "AIzaSyA8I3ybJNfXLYvx6quNcgYv9mDpOMyWhjc",
          authDomain: "donde-carmen.firebaseapp.com",
          projectId: "donde-carmen",
          storageBucket: "donde-carmen.firebasestorage.app",
          messagingSenderId: "432685338703",
          appId: "1:432685338703:web:81967270e483e477ed5a3a",
          measurementId: "G-TR69YF2SSC"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let sistemaDesbloqueado = false;
        let primerCargaCompleta = false; // Evita que se impriman todos los pedidos viejos al abrir la página

        // =========================================================================
        // 🛰️ ESCUCHAR LA NUBE EN TIEMPO REAL (FIRESTORE)
        // =========================================================================
        function activarEscuchaEnTiempoReal() {
            // Escuchamos la colección ordenando por fecha para tener las estadísticas correctas
            db.collection("pedidos_donde_carmen")
              .orderBy("fecha_raw", "asc")
              .onSnapshot((snapshot) => {
                let historialCompleto = [];
                let cambiosNuevos = snapshot.docChanges();

                snapshot.forEach((doc) => {
                    historialCompleto.push({
                        id_documento: doc.id,
                        ...doc.data()
                    });
                });

                // Renderizar los indicadores del día y las tarjetas
                actualizarPantallaYMetricas(historialCompleto);

                // CONTROL DE ALERTA Y AUTO-IMPRESIÓN (Solo si no es la carga inicial de la página)
                if (primerCargaCompleta) {
                    cambiosNuevos.forEach((cambio) => {
                        // Si entró un documento nuevo a la nube
                        if (cambio.type === "added") {
                            const numeroNuevoPedido = historialCompleto.length;
                            
                            if (sistemaDesbloqueado) {
                                ejecutarTimbreRestaurante();
                                setTimeout(() => {
                                    imprimirComanda(numeroNuevoPedido);
                                }, 600);
                            }
                        }
                    });
                } else {
                    primerCargaCompleta = true; // El sistema ya cargó el histórico, los próximos sí timbrarán
                }
            }, (error) => {
                console.error("Error al conectar con la nube en tiempo real: ", error);
            });
        }

        // =========================================================================
        // 📺 DIBUJAR LOS PEDIDOS Y MÉTRICAS EN PANTALLA
        // =========================================================================
        function actualizarPantallaYMetricas(historial) {
            const contenedor = document.getElementById("contenedor-historial");
            let totalVentas = 0;
            contenedor.innerHTML = "";

            if (historial.length === 0) {
                contenedor.innerHTML = `<div class="sin-pedidos">No se han registrado ventas el día de hoy. ¡A vender! 🔥</div>`;
                document.getElementById("total-pedidos").textContent = "0";
                document.getElementById("total-ventas").textContent = "$0";
                document.getElementById("ticket-promedio").textContent = "$0";
                return;
            }

            // Renderizamos al revés (slice().reverse()) para ver los más recientes arriba del todo
            historial.slice().reverse().forEach((pedido, index) => {
                totalVentas += pedido.total;
                const numeroPedidoReal = historial.length - index;
                const indexOriginal = historial.length - 1 - index;
                
                let itemsHTML = "";
                pedido.productos.forEach((prod, prodIndex) => {
                    let detallesTexto = "";
                    if (prod.customDetails !== undefined) {
                        detallesTexto = prod.customDetails;
                    } else {
                        let agregados = [];
                        if(prod.acompanamiento) agregados.push(prod.acompanamiento);
                        if(prod.adiciones && prod.adiciones.length > 0) agregados.push(`Extras: ${prod.adiciones.join(', ')}`);
                        if(prod.salsas && prod.salsas.length > 0) agregados.push(`Salsas: ${prod.salsas.join(', ')}`);
                        if(prod.quitados && prod.quitados.length > 0) agregados.push(`Sin: ${prod.quitados.join(', ')}`);
                        detallesTexto = agregados.join(' | ');
                    }

                    itemsHTML += `
                        <li>
                            <div style="flex: 1;">
                                <strong>${prod.cantidad}x</strong> ${prod.nombre} - $${(prod.precio * prod.cantidad).toLocaleString('es-CO')}
                                <div class="detalles-item" title="Haz doble clic para modificar ingredientes" ondblclick="modificarIngredientesTexto('${pedido.id_documento}', ${prodIndex})">📝 ${detallesTexto || 'Sin especificaciones (Doble clic para añadir)'}</div>
                            </div>
                            <div class="controles-item-derecha" style="display:flex; gap:5px; align-items:center;">
                                <button class="btn-accion-item" onclick="cambiarCantidadProducto('${pedido.id_documento}', ${prodIndex}, 1)">＋</button>
                                <button class="btn-accion-item" onclick="cambiarCantidadProducto('${pedido.id_documento}', ${prodIndex}, -1)">－</button>
                            </div>
                        </li>
                    `;
                });

                const div = document.createElement("div");
                div.className = "pedido-bloque";
                div.id = `pedido-card-${numeroPedidoReal}`; 
                div.innerHTML = `
                    <div class="pedido-header">
                        <span>📋 Pedido #${numeroPedidoReal}</span>
                        <button class="btn-cancelar-pedido" onclick="eliminarPedidoCompleto('${pedido.id_documento}')">Anular Pedido 🗑️</button>
                    </div>
                    <div class="pedido-items">
                        <ul>${itemsHTML}</ul>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 10px;">
                        <div>
                            <button class="btn-imprimir" onclick="imprimirComanda(${numeroPedidoReal})">🖨️ Imprimir</button>
                            <span style="font-size:0.75rem; color:#64748b; margin-left: 10px;">Hora: ${pedido.hora}</span>
                        </div>
                        <span class="pedido-total">$${pedido.total.toLocaleString('es-CO')}</span>
                    </div>
                `;
                contenedor.appendChild(div);
            });

            document.getElementById("total-pedidos").textContent = historial.length;
            document.getElementById("total-ventas").textContent = `$${totalVentas.toLocaleString('es-CO')}`;
            document.getElementById("ticket-promedio").textContent = `$${Math.round(totalVentas / historial.length).toLocaleString('es-CO')}`;
        }

        // =========================================================================
        // 🛠️ ACCIONES EN VIVO DIRECTO A LA NUBE DE FIREBASE
        // =========================================================================
        function cambiarCantidadProducto(docId, prodIndex, cambio) {
            const docRef = db.collection("pedidos_donde_carmen").doc(docId);
            
            docRef.get().then((doc) => {
                if (doc.exists) {
                    let pedido = doc.data();
                    let producto = pedido.productos[prodIndex];
                    
                    producto.cantidad += cambio;
                    
                    if (producto.cantidad <= 0) {
                        pedido.productos.splice(prodIndex, 1);
                    }
                    
                    // Si se borraron todos los productos, anulamos la orden entera
                    if (pedido.productos.length === 0) {
                        docRef.delete();
                    } else {
                        // Recalcular total del documento
                        pedido.total = pedido.productos.reduce((sum, p) => sum + (p.precio * p.cantidad), 0);
                        docRef.update(pedido);
                    }
                }
            });
        }

        function modificarIngredientesTexto(docId, prodIndex) {
            const docRef = db.collection("pedidos_donde_carmen").doc(docId);
            
            docRef.get().then((doc) => {
                if (doc.exists) {
                    let pedido = doc.data();
                    let producto = pedido.productos[prodIndex];
                    
                    let textoActual = "";
                    if (producto.customDetails !== undefined) {
                        textoActual = producto.customDetails;
                    } else {
                        let agregados = [];
                        if(producto.acompanamiento) agregados.push(producto.acompanamiento);
                        if(producto.adiciones && producto.adiciones.length > 0) agregados.push(`Extras: ${producto.adiciones.join(', ')}`);
                        if(producto.salsas && producto.salsas.length > 0) agregados.push(`Salsas: ${producto.salsas.join(', ')}`);
                        if(producto.quitados && producto.quitados.length > 0) agregados.push(`Sin: ${producto.quitados.join(', ')}`);
                        textoActual = agregados.join(' | ');
                    }

                    const nuevoTexto = prompt("Modifica los ingredientes de la comanda en la nube:", textoActual);
                    if (nuevoTexto !== null) {
                        producto.customDetails = nuevoTexto.trim();
                        docRef.update(pedido);
                    }
                }
            });
        }

        function eliminarPedidoCompleto(docId) {
            if (confirm("⚠️ ¿Deseas ANULAR y eliminar permanentemente este pedido de la nube?")) {
                db.collection("pedidos_donde_carmen").doc(docId).delete()
                  .then(() => console.log("Pedido eliminado de Firebase"))
                  .catch((err) => console.error("Error al borrar: ", err));
            }
        }

        function limpiarBaseDatos() {
            if (confirm("🚨 ¿Estás seguro de cerrar caja? Esto ELIMINARÁ TODOS los pedidos de la nube para comenzar un nuevo día.")) {
                db.collection("pedidos_donde_carmen").get().then((snapshot) => {
                    let batch = db.batch();
                    snapshot.forEach((doc) => {
                        batch.delete(doc.ref);
                    });
                    batch.commit().then(() => {
                        console.log("Caja cerrada. Nube limpia.");
                    });
                });
            }
        }

        // =========================================================================
        // HERRAMIENTAS DE AUDIO, IMPRESIÓN Y EXPORTACIÓN
        // =========================================================================
        function desbloquearAudio() {
            sistemaDesbloqueado = true;
            const btn = document.getElementById("btn-audio");
            btn.textContent = "🔔 Sistema Listo";
            btn.className = "btn-alerta-audio activo";
            ejecutarTimbreRestaurante();
        }

        function ejecutarTimbreRestaurante() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const tocarNota = (frecuencia, inicio, duracion) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(frecuencia, inicio);
                    gain.gain.setValueAtTime(0.2, inicio); 
                    gain.gain.exponentialRampToValueAtTime(0.001, inicio + duracion);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(inicio);
                    osc.stop(inicio + duracion);
                };
                const ahora = audioCtx.currentTime;
                tocarNota(783.99, ahora, 0.4); 
                tocarNota(659.25, ahora + 0.22, 0.5); 
            } catch (e) {
                console.log("Error de audio:", e);
            }
        }

        function imprimirComanda(numeroPedido) {
            const tarjetaPedido = document.getElementById(`pedido-card-${numeroPedido}`);
            if (tarjetaPedido) {
                tarjetaPedido.id = "ticket-impresion";
                window.print();
                tarjetaPedido.id = `pedido-card-${numeroPedido}`;
            }
        }

        function exportarReporte() {
            db.collection("pedidos_donde_carmen").orderBy("fecha_raw", "asc").get().then((snapshot) => {
                if(snapshot.empty) return alert("No hay datos para exportar.");
                
                let csvContent = "data:text/csv;charset=utf-8,ID Pedido,Hora,Total Venta\n";
                let index = 1;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    csvContent += `${index},${data.hora},${data.total}\n`;
                    index++;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Ventas_Donde_Carmen_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }

        // Inicializar la conexión en tiempo real al arrancar
        activarEscuchaEnTiempoReal();
    </script>
</body>
</html>
